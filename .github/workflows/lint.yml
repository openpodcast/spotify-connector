name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: 1

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Check code formatting with Black
        run: uv run black --check --diff spotifyconnector/ tests/

      - name: Check import sorting with isort
        run: uv run isort --check-only --diff spotifyconnector/ tests/

      - name: Run flake8 style checks
        run: uv run flake8 spotifyconnector/ --max-line-length=88 --extend-ignore=E203,W503

      - name: Run pylint code analysis
        run: uv run pylint spotifyconnector/ --rcfile=./pylintrc
        continue-on-error: true
