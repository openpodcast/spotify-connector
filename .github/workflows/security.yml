name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

env:
  PYTHONUNBUFFERED: 1

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run Safety check for known vulnerabilities
        run: |
          uv run safety check --json --output safety-report.json || true
          uv run safety check --short-report

      - name: Run Bandit security linter
        run: |
          uv run bandit -r spotifyconnector/ -f json -o bandit-report.json || true
          uv run bandit -r spotifyconnector/

      - name: Run Semgrep security scanner
        run: |
          uv run semgrep --config=auto spotifyconnector/ --json --output=semgrep-report.json || true
          uv run semgrep --config=auto spotifyconnector/

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: |
            safety-report.json
            bandit-report.json
            semgrep-report.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
